name: Build Docker Images

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          # load: true is intentionally omitted — incompatible with multi-platform builds
          tags: trieve/firecrawl-for-agents:pr-${{ github.event.number }}
          build-args: |
            PORT=8080

  build-puppeteer:
    name: Build Puppeteer Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/puppeteer-service-ts/
          file: ./apps/puppeteer-service-ts/Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          # load: true is intentionally omitted — incompatible with multi-platform builds
          tags: trieve/puppeteer-service-ts:pr-${{ github.event.number }}
          build-args: |
            PORT=3000
